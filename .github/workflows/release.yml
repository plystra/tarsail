name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select release version
        shell: bash
        run: |
          set -euo pipefail
          commit="$(git rev-parse --short=12 HEAD)"
          commit_date="$(TZ=UTC git show -s --format=%cd --date=format-local:%Y%m%d-%H%M%S HEAD)"
          built_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          version="${commit_date}-${commit}"

          echo "TARSAIL_VERSION=$version" >> "$GITHUB_ENV"
          echo "TARSAIL_COMMIT=$commit" >> "$GITHUB_ENV"
          echo "TARSAIL_BUILT_AT=$built_at" >> "$GITHUB_ENV"
          echo "Releasing $version"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist build

          ldflags="-s -w -X main.version=${TARSAIL_VERSION} -X main.commit=${TARSAIL_COMMIT} -X main.date=${TARSAIL_BUILT_AT}"

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
            "windows arm64"
          )

          for target in "${targets[@]}"; do
            read -r os arch <<< "$target"
            name="tarsail_${TARSAIL_VERSION}_${os}_${arch}"
            out_dir="build/${name}"
            mkdir -p "$out_dir"

            binary="tarsail"
            if [ "$os" = "windows" ]; then
              binary="tarsail.exe"
            fi

            echo "Building ${os}/${arch}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build \
              -trimpath \
              -ldflags "$ldflags" \
              -o "${out_dir}/${binary}" \
              ./cmd/tarsail

            cp README.md LICENSE "$out_dir/"

            if [ "$os" = "windows" ]; then
              (cd build && zip -qr "../dist/${name}.zip" "$name")
            else
              tar -C build -czf "dist/${name}.tar.gz" "$name"
            fi
          done

          (cd dist && sha256sum * > SHA256SUMS)

      - name: Write release notes
        shell: bash
        run: |
          {
            echo "Tarsail ${TARSAIL_VERSION}"
            echo
            echo "Built from commit ${GITHUB_SHA}."
            echo "Published automatically from ${GITHUB_REF_NAME}."
            echo
            echo "Prebuilt binaries are attached for:"
            echo
            echo "- Linux amd64 and arm64"
            echo "- macOS amd64 and arm64"
            echo "- Windows amd64 and arm64"
            echo
            echo "Install or upgrade from the documentation site:"
            echo
            echo '```bash'
            echo "curl -fsSL https://tarsail.plystra.com/install.sh | sh"
            echo '```'
            echo
            echo '```powershell'
            echo "irm https://tarsail.plystra.com/install.ps1 | iex"
            echo '```'
          } > release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TARSAIL_VERSION" >/dev/null 2>&1; then
            gh release upload "$TARSAIL_VERSION" dist/* --clobber
            gh release edit "$TARSAIL_VERSION" \
              --title "Tarsail ${TARSAIL_VERSION}" \
              --notes-file release-notes.md \
              --latest
          else
            gh release create "$TARSAIL_VERSION" dist/* \
              --title "Tarsail ${TARSAIL_VERSION}" \
              --notes-file release-notes.md \
              --target "$GITHUB_SHA" \
              --latest
          fi
