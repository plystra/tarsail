name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Select release tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "TARSAIL_TAG=$tag" >> "$GITHUB_ENV"
          echo "Releasing $tag"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist build

          commit="$(git rev-parse --short=12 HEAD)"
          built_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X main.version=${TARSAIL_TAG} -X main.commit=${commit} -X main.date=${built_at}"

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
            "windows arm64"
          )

          for target in "${targets[@]}"; do
            read -r os arch <<< "$target"
            name="tarsail_${TARSAIL_TAG}_${os}_${arch}"
            out_dir="build/${name}"
            mkdir -p "$out_dir"

            binary="tarsail"
            if [ "$os" = "windows" ]; then
              binary="tarsail.exe"
            fi

            echo "Building ${os}/${arch}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build \
              -trimpath \
              -ldflags "$ldflags" \
              -o "${out_dir}/${binary}" \
              ./cmd/tarsail

            cp README.md LICENSE "$out_dir/"

            if [ "$os" = "windows" ]; then
              (cd build && zip -qr "../dist/${name}.zip" "$name")
            else
              tar -C build -czf "dist/${name}.tar.gz" "$name"
            fi
          done

          (cd dist && sha256sum * > SHA256SUMS)

      - name: Write release notes
        shell: bash
        run: |
          {
            echo "Tarsail ${TARSAIL_TAG}"
            echo
            echo "Prebuilt binaries are attached for:"
            echo
            echo "- Linux amd64 and arm64"
            echo "- macOS amd64 and arm64"
            echo "- Windows amd64 and arm64"
            echo
            echo "Install or upgrade from the documentation site:"
            echo
            echo '```bash'
            echo "curl -fsSL https://tarsail.plystra.com/install.sh | sh"
            echo '```'
            echo
            echo '```powershell'
            echo "irm https://tarsail.plystra.com/install.ps1 | iex"
            echo '```'
          } > release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TARSAIL_TAG" >/dev/null 2>&1; then
            gh release upload "$TARSAIL_TAG" dist/* --clobber
          else
            gh release create "$TARSAIL_TAG" dist/* \
              --title "Tarsail ${TARSAIL_TAG}" \
              --notes-file release-notes.md
          fi
